{% extends "student/dashboard_base.html" %}

{% block dashboard_content %}

<div class = "container">
    <div class = "row text-left">
        <div class = "col-12">You can edit all fields except username and email.</div>
    </div>
</div>

<form method = "POST" action= "/student/profile" enctype="multipart/form-data">
    <div class = "row mb-3">
        <div class ="col">
            <label> First Name </label>
            <input type = "text" class = "form-control" placeholder="First name" name = "fname" value="{{ current_user.fname }}" required>
        </div>

        <div class = "col">
            <label> Last Name</label>
            <input type = "text" class = "form-control" placeholder="Last name" name = "lname" value="{{ current_user.lname }}" required>
        </div>
        
    </div>

    <div class = "row mb-3">
        <div class = "col">
            <label> Username </label>
            <input type = "text" class = "form-control" placeholder="username" maxlength="80" name = "username" value="{{ current_user.username }}" readonly>
        </div>

        <div class = "col">
            <label> Email </label>
            <input type = "email" class = "form-control" placeholder="first_last@gmail.com" name ="email" value="{{ current_user.email }}" readonly>
        </div>
    </div>

    <div class="form-check">
    <div class = "row mb-3">
        <label class = "form-label"> Choose gender </label>
        <div class ="col-6 form-check">
            <input class = "form-check-input" type = "radio" name = "gender" value = "male" {% if current_user.gender == "male" %}checked{% endif %} required>
            <label class = "form-check-label">Male</label>
        </div>

        <div class = "col-6 form-check">
            <input class = "form-check-input" type = "radio" name = "gender" value="female" {% if current_user.gender == "female" %}checked{% endif %} required>
            <label class = "form-check-label">Female</label>
        </div>
        <div class = "col-6 form-check">
            <input class = "form-check-input" type = "radio" name="gender" value="non-binary" {% if current_user.gender == "non-binary" %}checked{% endif %} required>
            <label class = "form-check-label">Non-binary</label>
        </div>
        <div class = "col-6 form-check">
            <input class = "form-check-input" type = "radio" name="gender" value="other" {% if current_user.gender == "other" %}checked{% endif %} required>
            <label class = "form-check-label">Other</label>
        </div>
    </div>
    </div>

    <div class="row mb-3">
        <div class = "col">
            <label> University Name </label>
            <input type = "text" class = "form-control" placeholder="IIT, Madras" name = "university_name" value="{{ current_user.student.university }}" required>
        </div>

        <div class = "col">
            <label> Major </label>
            <input type = "text" class = "form-control" placeholder="Computer Science Engineering" name ="major" value="{{ current_user.student.major }}" required>
        </div>

        <div class = "col">
            <label> CGPA </label>
            <input type = "text" class = "form-control" placeholder="10/10" name ="gpa" value="{{ current_user.student.gpa }}" required>
        </div>
    </div>

    <div class="row mb-5">
        <div class = "col">
            <label> Resume </label>
            <input type="file" class="form-control" name="resume" accept=".pdf">
        </div>

        <div class = "col">
            <label> Years of experience </label>
            <input type = "text" class = "form-control" placeholder="1.5" name ="exp" value="{{ current_user.student.years_of_experience }}" required>
        </div>

    </div>

    <div class="row mb-6">
        <div class = "col">
            <button type = "submit">Save</button>
        </div>
    </div>

</form>

{%endblock dashboard_content%}
